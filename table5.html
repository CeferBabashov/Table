<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table5</title>
    <style>
        table{
            width: 500px;
            height: 300px;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table border="2" cellspacing="2" cellpadding="0"> 
        <tr>
            <th rowspan="3">Day</th>
            <th colspan="3">Seminar</th>
        </tr>
        <tr>
            <th colspan="2">Schedule</th>
            <th rowspan="2">Topic</th>
        </tr>
        <tr>
            <th>Begin</th>
            <th>End</th>
        </tr>
        <tr>
            <td rowspan="2">Monday</td>
            <td rowspan="2" bgcolor="#F4DA30">8:00 a.m</td>
            <td rowspan="2" bgcolor="#006262">5:00 p.m</td>
            <td>Indtroduction to XML</td>
        </tr>
        <tr>
            <td>Validity:DTD and Relax NG</td>
        </tr>
        <tr>
            <td rowspan="3">Tuesday</td>
            <td bgcolor="#F4DA30">8:00 a.m</td>
            <td bgcolor="#F4DA30">11:00 a.m</td>
            <td rowspan="2">X-Path</td>
        </tr>
        <tr>
            <td bgcolor="#F4DA30">11:00 a.m</td>
            <td bgcolor="#50C878">2:00 p.m</td>
        </tr>
        <tr>
            <td bgcolor="#50C878">2:00 p.m</td>
            <td bgcolor="#006262">5:00 p.m</td>
            <td rowspan="1.5">XSL Transformations</td>
        </tr>

        <tr>
            <td>Wednesday</td>
            <td bgcolor="#F4DA30">8:00 a.m</td>
            <td bgcolor="#50C878">12:00 p.m</td>
            <td>XSL Formatting Objects</td>
        </tr>
    </table>

</body>
</html>
